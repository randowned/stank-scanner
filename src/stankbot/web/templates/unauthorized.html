{% extends "base.html" %}
{% block title %}StankBot — Unauthorized{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:24px;">
  <div>
    <div style="font-size:3rem; margin-bottom:16px;">🚫</div>
    <h1 style="margin:0 0 8px;">Access Denied</h1>
    <p class="muted" style="margin:0 0 32px; max-width:380px;">
      You're logged in as <strong>{{ user.username }}</strong>, but you're not a member of the MAPHRA Discord server.
      Try logging in with a different Discord account.
    </p>
    <a href="/auth/logout" style="display:inline-block; background:var(--border); color:var(--text); font-weight:600; padding:12px 28px; border-radius:8px; text-decoration:none; font-size:1rem;">
      Switch Account
    </a>
  </div>
</div>
{% endblock %}
