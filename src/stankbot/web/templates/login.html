{% extends "base.html" %}
{% block title %}StankBot — Login{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:24px;">
  <div>
    <img src="/static/Stank.gif" alt="Stank" style="height:64px; width:auto; margin-bottom:16px;">
    <h1 style="margin:0 0 8px;">StankBot</h1>
    <p class="muted" style="margin:0 0 32px; max-width:360px;">
      Track stank chains, session records, and leaderboards on MAPHRA Discord server.
    </p>
    <a href="/auth/login" style="display:inline-block; background:var(--accent); color:#1a1425; font-weight:600; padding:12px 28px; border-radius:8px; text-decoration:none; font-size:1rem;">
      Login with Discord
    </a>
  </div>
</div>
{% endblock %}
